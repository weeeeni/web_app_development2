{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
                <h3 class="mb-0 fw-bold text-primary">編輯讀書筆記</h3>
                <form action="{{ url_for('notes.delete_note', id=note.id) }}" method="POST" class="d-inline" onsubmit="return confirm('確定要刪除這筆筆記嗎？');">
                    <button type="submit" class="btn btn-outline-danger shadow-sm rounded-pill px-3">刪除此筆記</button>
                </form>
            </div>
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('notes.update_note', id=note.id) }}" method="POST">
                    
                    <div class="mb-4">
                        <label for="title" class="form-label fw-bold text-dark">書名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light" id="title" name="title" value="{{ note.title }}" required>
                    </div>

                    <div class="mb-4">
                        <label for="rating" class="form-label fw-bold text-dark">評分</label>
                        <select class="form-select form-select-lg bg-light" id="rating" name="rating">
                            <option value="5" {% if note.rating|string == '5' %}selected{% endif %}>⭐⭐⭐⭐⭐ (5) 極度推薦</option>
                            <option value="4" {% if note.rating|string == '4' %}selected{% endif %}>⭐⭐⭐⭐ (4) 值得一讀</option>
                            <option value="3" {% if note.rating|string == '3' %}selected{% endif %}>⭐⭐⭐ (3) 普普通通</option>
                            <option value="2" {% if note.rating|string == '2' %}selected{% endif %}>⭐⭐ (2) 不太喜歡</option>
                            <option value="1" {% if note.rating|string == '1' %}selected{% endif %}>⭐ (1) 非常失望</option>
                        </select>
                    </div>
                    
                    <div class="mb-5">
                        <label for="content" class="form-label fw-bold text-dark">閱讀心得</label>
                        <textarea class="form-control bg-light" id="content" name="content" rows="8">{{ note.content }}</textarea>
                    </div>
                    
                    <div class="d-grid gap-3 d-md-flex justify-content-md-center">
                        <a href="{{ url_for('notes.index') }}" class="btn btn-outline-secondary btn-lg px-5 rounded-pill">取消</a>
                        <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
