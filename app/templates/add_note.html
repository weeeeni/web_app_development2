{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h3 class="mb-0 text-center fw-bold text-primary">新增讀書筆記</h3>
            </div>
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('notes.create_note') }}" method="POST">
                    
                    <div class="mb-4">
                        <label for="title" class="form-label fw-bold text-dark">書名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light" id="title" name="title" value="{{ title|default('') }}" required placeholder="例如：原子習慣">
                    </div>

                    <div class="mb-4">
                        <label for="rating" class="form-label fw-bold text-dark">評分</label>
                        <select class="form-select form-select-lg bg-light" id="rating" name="rating">
                            <option value="5" {% if rating|default('5') == '5' %}selected{% endif %}>⭐⭐⭐⭐⭐ (5) 極度推薦</option>
                            <option value="4" {% if rating|default('') == '4' %}selected{% endif %}>⭐⭐⭐⭐ (4) 值得一讀</option>
                            <option value="3" {% if rating|default('') == '3' %}selected{% endif %}>⭐⭐⭐ (3) 普普通通</option>
                            <option value="2" {% if rating|default('') == '2' %}selected{% endif %}>⭐⭐ (2) 不太喜歡</option>
                            <option value="1" {% if rating|default('') == '1' %}selected{% endif %}>⭐ (1) 非常失望</option>
                        </select>
                    </div>
                    
                    <div class="mb-5">
                        <label for="content" class="form-label fw-bold text-dark">閱讀心得</label>
                        <textarea class="form-control bg-light" id="content" name="content" rows="8" placeholder="寫下你對這本書的想法或重點摘要...">{{ content|default('') }}</textarea>
                    </div>
                    
                    <div class="d-grid gap-3 d-md-flex justify-content-md-center">
                        <a href="{{ url_for('notes.index') }}" class="btn btn-outline-secondary btn-lg px-5 rounded-pill">取消</a>
                        <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">儲存筆記</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
